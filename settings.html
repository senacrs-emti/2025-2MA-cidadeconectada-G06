<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Agente Urbano</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./imagens/urbanoide.png" type="image/x-icon">
    <style>
        :root {
            --bg: #f7fafc;
            --panel: #ffffff;
            --panel-alt: #f1f5f9;
            --text: #0f172a;
            --muted: #4b5563;
            --primary: #0ea5e9;
            --border: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px 60px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand img {
            width: 5rem;
            height: 5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--panel-alt);
            color: var(--text);
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        .back-link:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .section {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: grid;
            gap: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            margin-bottom: 40px;
        }

        .section h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 12px;
            border-radius: 12px;
            background: var(--panel-alt);
            border: 1px solid var(--border);
        }

        .option-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .option-text .label {
            font-weight: 700;
        }

        .option-text .desc {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .pill {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(14, 165, 233, 0.12);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            border: 1px solid rgba(14, 165, 233, 0.4);
        }

        .toggle {
            position: relative;
            width: 60px;
            height: 30px;
            border-radius: 999px;
            background: #1f2937;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: white;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .toggle.on {
            background: var(--primary);
            border-color: var(--primary);
        }

        .toggle.on::after {
            transform: translateX(30px);
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .list-placeholder {
            display: grid;
            gap: 10px;
        }

        .placeholder-row {
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-weight: 600;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Tema escuro */
        body.dark-mode {
            --bg: #0b1220;
            --panel: #0f172a;
            --panel-alt: #111827;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #0ea5e9;
            --border: #1f2937;
            /* alinhar variáveis usadas na barra de rolagem global */
            --light-bg: #0b1220;
            --primary-color: #0ea5e9;
        }

        /* Barra de rolagem no tema escuro */
        body.dark-mode::-webkit-scrollbar-track,
        html.dark-mode::-webkit-scrollbar-track {
            background: #0b1220;
        }

        body.dark-mode::-webkit-scrollbar-thumb,
        html.dark-mode::-webkit-scrollbar-thumb {
            background-color: #0ea5e9;
            border: 2px solid #0b1220;
        }

        body.dark-mode,
        html.dark-mode {
            scrollbar-color: #0ea5e9 #0b1220;
        }

        @media (max-width: 640px) {
            .page {
                gap: 16px;
            }

            .option-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="page-header">
            <div class="brand">
                <img src="imagens/urbanoide.png" alt="Agente Urbano">
                <div>
                    <div style="font-size:3.1rem;">Configurações</div>
                    <div style="color: var(--muted); font-size:1.5rem;">Personalize sua experiência</div>
                </div>
            </div>
            <a class="back-link" href="index.html"><i class="fas fa-arrow-left"></i> Voltar</a>
        </div>

        <section class="section">
            <h2>Preferências</h2>
            <div class="option-row">
                <div class="option-text">
                    <span class="label">Tema do site</span>
                    <span class="desc">Alterna entre claro e escuro. É salvo no navegador.</span>
                </div>
                <div id="theme-toggle-settings" class="toggle" role="switch" aria-checked="false"></div>
            </div>
        </section>

        <section class="section">
            <div style="display:flex; align-items:center; gap:8px;">
                <h2>Outras configurações</h2>
                <span class="pill">Em breve</span>
            </div>
            <div class="list-placeholder">
                <div class="placeholder-row">Notificações (push/email)</div>
                <div class="placeholder-row">Idioma</div>
                <div class="placeholder-row">Acessibilidade</div>
                <div class="placeholder-row">Privacidade e dados</div>
                <div class="placeholder-row">Localização e geofencing</div>
                <div class="placeholder-row">Integrações</div>
            </div>
        </section>
    </div>

    <script>
        const THEME_STORAGE_KEY = 'agenteurbano_theme';

        function applyTheme(isDark) {
            document.body.classList.toggle('dark-mode', isDark);
            document.documentElement.classList.toggle('dark-mode', isDark);
        }

        function loadTheme() {
            const saved = localStorage.getItem(THEME_STORAGE_KEY);
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            return saved ? saved === 'dark' : prefersDark;
        }

        function saveTheme(isDark) {
            localStorage.setItem(THEME_STORAGE_KEY, isDark ? 'dark' : 'light');
        }

        function initThemeSetting() {
            const toggle = document.getElementById('theme-toggle-settings');
            if (!toggle) return;
            let isDark = loadTheme();
            applyTheme(isDark);
            toggle.classList.toggle('on', isDark);
            toggle.setAttribute('aria-checked', String(isDark));

            toggle.addEventListener('click', () => {
                isDark = !isDark;
                applyTheme(isDark);
                saveTheme(isDark);
                toggle.classList.toggle('on', isDark);
                toggle.setAttribute('aria-checked', String(isDark));
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initThemeSetting();
        });
    </script>
</body>

</html>
